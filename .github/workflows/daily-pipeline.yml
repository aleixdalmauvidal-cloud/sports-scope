name: Daily CMV Pipeline

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Sync football stats (daily)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_FOOTBALL_URL: ${{ secrets.API_FOOTBALL_URL }}
        run: npm run sync:football
      - name: Scrape Instagram (weekly - Mondays only)
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && contains(fromJSON('["1"]'), format('{0}', steps.day.outputs.dow))) }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: npm run scrape:instagram
      - name: Scrape TikTok (weekly - Mondays only)
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && contains(fromJSON('["1"]'), format('{0}', steps.day.outputs.dow))) }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: npm run scrape:tiktok
      - name: Scrape X and YouTube (biweekly - 1st and 15th)
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && contains(fromJSON('["1","15"]'), format('{0}', steps.day.outputs.dom))) }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: npm run scrape:x && npm run scrape:youtube
      - name: Analyze brands (weekly - Mondays only)
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && contains(fromJSON('["1"]'), format('{0}', steps.day.outputs.dow))) }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run analyze:brands
      - name: Calculate CMV (daily)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run calc:cmv -- --force

